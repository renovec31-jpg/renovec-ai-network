  <body>
    <!-- Lien d'évitement (skip to content) — WCAG 2.1 AA 2.4.1 -->
    <a href="#contenu-principal" class="skip-link">Passer au contenu principal</a>

    <style>
      .skip-link {
        position: absolute;
        top: -40px;
        left: 0;
        background: #F26522;
        color: white;
        padding: 8px 16px;
        z-index: 9999;
        font-weight: 600;
        font-family: Inter, sans-serif;
        font-size: 14px;
        text-decoration: none;
        transition: top 0.2s;
      }
      .skip-link:focus {
        top: 0;
      }
    </style>

    <!-- GitHub Pages SPA routing: decode /?/path back to /path before React initialises -->
    <script>
      (function(l) {
        if (l.search[1] === '/') {
          var decoded = l.search.slice(1).split('&').map(function(s) {
            return s.replace(/~and~/g, '&');
          });
          window.history.replaceState(null, null,
            l.pathname.slice(0, -1) + decoded[0] +
            (decoded[1] ? '?' + decoded[1] : '') +
            l.hash
          );
        }
      }(window.location));
    </script>

    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
