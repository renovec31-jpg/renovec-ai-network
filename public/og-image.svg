<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <rect width="1200" height="630" fill="#0f0c08"/>

  <!-- Network nodes and links -->
  <g opacity="0.18">
    <circle cx="180" cy="120" r="6" fill="#f26522"/>
    <circle cx="320" cy="80" r="4" fill="#f26522"/>
    <circle cx="260" cy="200" r="5" fill="#f26522"/>
    <circle cx="420" cy="150" r="3.5" fill="#f26522"/>
    <circle cx="140" cy="280" r="4" fill="#f26522"/>
    <circle cx="350" cy="300" r="5.5" fill="#f26522"/>
    <circle cx="500" cy="220" r="3" fill="#f26522"/>
    <line x1="180" y1="120" x2="320" y2="80" stroke="#f26522" stroke-width="0.8"/>
    <line x1="180" y1="120" x2="260" y2="200" stroke="#f26522" stroke-width="0.8"/>
    <line x1="320" y1="80" x2="420" y2="150" stroke="#f26522" stroke-width="0.8"/>
    <line x1="260" y1="200" x2="350" y2="300" stroke="#f26522" stroke-width="0.8"/>
    <line x1="260" y1="200" x2="420" y2="150" stroke="#f26522" stroke-width="0.8"/>
    <line x1="140" y1="280" x2="260" y2="200" stroke="#f26522" stroke-width="0.8"/>
    <line x1="350" y1="300" x2="500" y2="220" stroke="#f26522" stroke-width="0.8"/>
    <line x1="420" y1="150" x2="500" y2="220" stroke="#f26522" stroke-width="0.8"/>
  </g>

  <g opacity="0.12">
    <circle cx="900" cy="450" r="7" fill="#f26522"/>
    <circle cx="1020" cy="500" r="4.5" fill="#f26522"/>
    <circle cx="1080" cy="420" r="5" fill="#f26522"/>
    <circle cx="950" cy="550" r="3.5" fill="#f26522"/>
    <circle cx="820" cy="520" r="4" fill="#f26522"/>
    <circle cx="1100" cy="540" r="3" fill="#f26522"/>
    <line x1="900" y1="450" x2="1020" y2="500" stroke="#f26522" stroke-width="0.7"/>
    <line x1="900" y1="450" x2="1080" y2="420" stroke="#f26522" stroke-width="0.7"/>
    <line x1="1020" y1="500" x2="1080" y2="420" stroke="#f26522" stroke-width="0.7"/>
    <line x1="1020" y1="500" x2="950" y2="550" stroke="#f26522" stroke-width="0.7"/>
    <line x1="820" y1="520" x2="900" y2="450" stroke="#f26522" stroke-width="0.7"/>
    <line x1="1020" y1="500" x2="1100" y2="540" stroke="#f26522" stroke-width="0.7"/>
  </g>

  <g opacity="0.08">
    <circle cx="750" cy="100" r="5" fill="#f26522"/>
    <circle cx="880" cy="140" r="3.5" fill="#f26522"/>
    <circle cx="1000" cy="90" r="4" fill="#f26522"/>
    <circle cx="1100" cy="170" r="3" fill="#f26522"/>
    <line x1="750" y1="100" x2="880" y2="140" stroke="#f26522" stroke-width="0.6"/>
    <line x1="880" y1="140" x2="1000" y2="90" stroke="#f26522" stroke-width="0.6"/>
    <line x1="1000" y1="90" x2="1100" y2="170" stroke="#f26522" stroke-width="0.6"/>
  </g>

  <!-- Logo: orange square + RENOVEC text -->
  <rect x="440" y="200" width="44" height="44" rx="8" fill="#f26522"/>
  <text x="498" y="237" font-family="system-ui, -apple-system, sans-serif" font-size="42" font-weight="700" fill="#ffffff" letter-spacing="3">RENOVEC</text>

  <!-- Tagline -->
  <text x="600" y="300" font-family="system-ui, -apple-system, sans-serif" font-size="22" font-weight="400" fill="rgba(255,255,255,0.75)" text-anchor="middle">Le reseau qui comprend avant d'orienter.</text>

  <!-- Orange separator line -->
  <rect x="520" y="330" width="160" height="2" rx="1" fill="#f26522" opacity="0.7"/>

  <!-- Sub-text -->
  <text x="600" y="375" font-family="system-ui, -apple-system, sans-serif" font-size="15" font-weight="400" fill="rgba(255,255,255,0.4)" text-anchor="middle" letter-spacing="1.5">Human Capability Network · IA · France</text>

  <!-- Subtle radial glow behind logo area -->
  <defs>
    <radialGradient id="glow" cx="50%" cy="45%" r="35%">
      <stop offset="0%" stop-color="#f26522" stop-opacity="0.04"/>
      <stop offset="100%" stop-color="#f26522" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#glow)"/>
</svg>
