<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Page introuvable — RENOVEC</title>
  <meta name="robots" content="noindex">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

  <!-- GitHub Pages SPA redirect — keeps the routing alive -->
  <script>
    (function() {
      var l = window.location;
      // Only redirect if this is a deep path, not a true 404
      if (l.pathname !== '/404.html') {
        l.replace(
          l.protocol + '//' + l.hostname + (l.port ? ':' + l.port : '') +
          '/?/' + l.pathname.slice(1).replace(/&/g, '~and~') +
          (l.search ? '&' + l.search.slice(1).replace(/&/g, '~and~') : '') +
          l.hash
        );
      }
    })();
  </script>

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Inter', system-ui, sans-serif;
      background: #0c0a09;
      color: rgba(255,255,255,0.75);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 40px 24px;
    }

    .logo-mark {
      width: 36px;
      height: 36px;
      border-radius: 50%;
      border: 2px solid rgba(242,101,34,0.6);
      position: relative;
      margin-bottom: 6px;
    }
    .logo-mark::after {
      content: '';
      position: absolute;
      inset: 5px;
      border-radius: 50%;
      background: rgba(242,101,34,0.25);
    }

    .logo {
      display: flex;
      align-items: center;
      gap: 10px;
      text-decoration: none;
      color: #fff;
      font-size: 17px;
      font-weight: 700;
      letter-spacing: 0.04em;
      margin-bottom: 64px;
    }

    .eyebrow {
      font-size: 11px;
      font-weight: 600;
      letter-spacing: .1em;
      text-transform: uppercase;
      color: #F26522;
      margin-bottom: 16px;
    }

    h1 {
      font-size: clamp(28px, 6vw, 48px);
      font-weight: 700;
      letter-spacing: -0.02em;
      line-height: 1.15;
      color: #fff;
      text-align: center;
      margin-bottom: 16px;
    }

    .sub {
      font-size: 15px;
      color: rgba(255,255,255,0.42);
      line-height: 1.6;
      text-align: center;
      max-width: 380px;
      margin-bottom: 48px;
    }

    .ctas {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 12px;
    }

    .btn-primary {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 13px 28px;
      background: #F26522;
      color: #fff;
      font-family: inherit;
      font-size: 14px;
      font-weight: 600;
      border: none;
      border-radius: 8px;
      text-decoration: none;
      cursor: pointer;
      transition: background 0.15s;
    }
    .btn-primary:hover { background: #d95a1a; }

    .btn-ghost {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 10px 20px;
      background: transparent;
      color: rgba(255,255,255,0.45);
      font-family: inherit;
      font-size: 13px;
      font-weight: 500;
      border: 1px solid rgba(255,255,255,0.10);
      border-radius: 8px;
      text-decoration: none;
      cursor: pointer;
      transition: color 0.15s, border-color 0.15s;
    }
    .btn-ghost:hover { color: rgba(255,255,255,0.75); border-color: rgba(255,255,255,0.22); }

    .ring {
      position: fixed;
      border-radius: 50%;
      border: 1px solid rgba(242,101,34,0.08);
      animation: pulse 6s ease-in-out infinite;
      pointer-events: none;
    }
    .ring-1 { width: 320px; height: 320px; top: 50%; left: 50%; translate: -50% -50%; animation-delay: 0s; }
    .ring-2 { width: 520px; height: 520px; top: 50%; left: 50%; translate: -50% -50%; animation-delay: 1.5s; border-color: rgba(242,101,34,0.05); }
    .ring-3 { width: 720px; height: 720px; top: 50%; left: 50%; translate: -50% -50%; animation-delay: 3s; border-color: rgba(242,101,34,0.03); }

    @keyframes pulse {
      0%, 100% { opacity: 0.4; transform: scale(0.97); }
      50%       { opacity: 1;   transform: scale(1.02); }
    }
  </style>
</head>
<body>
  <!-- Ambient rings -->
  <div class="ring ring-1" aria-hidden="true"></div>
  <div class="ring ring-2" aria-hidden="true"></div>
  <div class="ring ring-3" aria-hidden="true"></div>

  <!-- Logo -->
  <a href="/" class="logo">
    <div class="logo-mark" aria-hidden="true"></div>
    RENOVEC
  </a>

  <!-- Content -->
  <p class="eyebrow">Page introuvable</p>
  <h1>Cette page n'existe pas<br />dans le réseau.</h1>
  <p class="sub">Mais les présences, elles, sont bien là. Revenez à l'accueil — l'IA saura vous orienter.</p>

  <div class="ctas">
    <a href="/" class="btn-primary">Revenir à l'accueil →</a>
    <a href="/#lp-search-results" class="btn-ghost">Exprimer une situation</a>
  </div>
</body>
</html>
